spring:
  application:
    name: spring-ai-chat-bot
  ai:
    ollama:
      init:
        pull-model-strategy: when_missing
      chat:
        model: hf.co/Qwen/Qwen2.5-1.5B-Instruct-GGUF # https://huggingface.co/Qwen/Qwen2.5-1.5B-Instruct-GGUF

logging:
  level:
    org.springframework.ai.chat.client.advisor: DEBUG